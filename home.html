<!DOCTYPE html>
<html>
<head>
    <title>Marido de Aluguel</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Ícones -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background: linear-gradient(135deg,#ff4da6,#ff99cc);">

<div class="container mt-5">

    <div class="text-center text-white mb-4">
        <h2>💅 Salão da Nem</h2>
        <p>Agende seu horário</p>
    </div>

    <div class="card p-4 shadow-lg rounded-4">

        <form method="POST">
        
        

            <div class="mb-3">
                <label><i class="bi bi-person"></i> Nome</label>
                <input type="text" name="nome" class="form-control" required>
            </div>

            <div class="mb-3">
                <label><i class="bi bi-phone"></i> Telefone</label>
                <input type="text" name="telefone" class="form-control" placeholder="31999999999" required>
                
                
                
                
                <div class="mb-3">
    <label>💅 Serviço</label>
    <select name="servico" class="form-control" required>
        <option value="">Selecione</option>
        <option value="Pé">Pé</option>
        <option value="Mãos">Mãos</option>
        <option value="Manutenção">Manutenção</option>
        <option value="Pé e Mãos">Pé e Mãos</option>
    </select>
</div>
            </div>

            <div class="mb-3">
                <label><i class="bi bi-calendar"></i> Horário</label>
                <select name="horario" class="form-control" required>
                    {% for h in horarios %}
                        <option value="{{ h.id }}">
                            {{ h.data }} - {{ h.hora }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button class="btn btn-success w-100">
                <i class="bi bi-check-circle"></i> Agendar
            </button>

        </form>

    </div>

</div>

</body>
</html>
